<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 530" role="img" aria-labelledby="title desc">
  <title id="title">Maat containers overview</title>
  <desc id="desc">Overview of stack, queue, and set packages in the maat Go module.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .ink { fill: #111827; }
    .muted { fill: #64748b; }
    .panel { fill: #ffffff; stroke: #d8e0ea; stroke-width: 2; }
    .rail { fill: #edf2f7; stroke: #cbd5e1; stroke-width: 1.5; }
    .blueSoft { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
    .greenSoft { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
    .title { font: 800 52px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    .subtitle { font: 500 21px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    .h2 { font: 800 28px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    .body { font: 600 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    .small { font: 600 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    .code { font: 700 18px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; letter-spacing: 0; }
    .arrow { fill: none; stroke: #64748b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0 0 12 5 0 10Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="530"/>

  <g transform="translate(64 50)">
    <text class="title ink" x="0" y="0" dominant-baseline="hanging">maat</text>
    <text class="subtitle muted" x="0" y="68">Generic Go containers with small APIs, explicit order, and predictable memory behavior.</text>
  </g>

  <g transform="translate(64 152)">
    <rect class="panel" width="330" height="272" rx="8"/>
    <text class="h2 ink" x="24" y="34">stack&lt;T&gt;</text>
    <text class="body muted" x="24" y="66">LIFO: last in, first out</text>
    <g transform="translate(56 102)">
      <rect class="blueSoft" x="46" y="0" width="84" height="36" rx="6"/>
      <rect class="blueSoft" x="46" y="43" width="84" height="36" rx="6"/>
      <rect class="blueSoft" x="46" y="86" width="84" height="36" rx="6"/>
      <text class="code ink" x="88" y="24" text-anchor="middle">3</text>
      <text class="code ink" x="88" y="67" text-anchor="middle">2</text>
      <text class="code ink" x="88" y="110" text-anchor="middle">1</text>
      <path class="arrow" marker-end="url(#arrow)" d="M166 18H236"/>
      <text class="code ink" x="248" y="24">Pop 3</text>
    </g>
    <text class="small muted" x="24" y="220">Push 1, 2, 3</text>
    <text class="small muted" x="24" y="244">Range: 3, 2, 1</text>
  </g>

  <g transform="translate(435 152)">
    <rect class="panel" width="330" height="272" rx="8"/>
    <text class="h2 ink" x="24" y="34">queue&lt;T&gt;</text>
    <text class="body muted" x="24" y="66">FIFO: first in, first out</text>
    <g transform="translate(34 124)">
      <path class="arrow" marker-end="url(#arrow)" d="M0 18H44"/>
      <rect class="greenSoft" x="56" y="0" width="62" height="36" rx="6"/>
      <rect class="greenSoft" x="126" y="0" width="62" height="36" rx="6"/>
      <rect class="greenSoft" x="196" y="0" width="62" height="36" rx="6"/>
      <path class="arrow" marker-end="url(#arrow)" d="M270 18H308"/>
      <text class="code ink" x="87" y="24" text-anchor="middle">1</text>
      <text class="code ink" x="157" y="24" text-anchor="middle">2</text>
      <text class="code ink" x="227" y="24" text-anchor="middle">3</text>
    </g>
    <text class="small muted" x="24" y="220">Enqueue 1, 2, 3</text>
    <text class="small muted" x="24" y="244">Dequeue 1</text>
  </g>

  <g transform="translate(806 152)">
    <rect class="panel" width="330" height="272" rx="8"/>
    <text class="h2 ink" x="24" y="34">set&lt;T&gt;</text>
    <text class="body muted" x="24" y="66">membership and set algebra</text>
    <g transform="translate(74 94)">
      <circle cx="78" cy="58" r="50" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
      <circle cx="142" cy="58" r="50" fill="#fef3c7" fill-opacity=".88" stroke="#d97706" stroke-width="3"/>
      <text class="code ink" x="44" y="64" text-anchor="middle">A</text>
      <text class="code ink" x="110" y="64" text-anchor="middle">A+B</text>
      <text class="code ink" x="176" y="64" text-anchor="middle">B</text>
    </g>
    <text class="small muted" x="24" y="220">Add, Contains, Remove</text>
    <text class="small muted" x="24" y="244">Union, Intersect, Difference</text>
  </g>

  <g transform="translate(64 456)">
    <rect class="rail" x="0" y="0" width="176" height="40" rx="8"/>
    <rect class="rail" x="196" y="0" width="202" height="40" rx="8"/>
    <rect class="rail" x="418" y="0" width="150" height="40" rx="8"/>
    <rect class="rail" x="588" y="0" width="164" height="40" rx="8"/>
    <rect class="rail" x="772" y="0" width="176" height="40" rx="8"/>
    <rect class="rail" x="968" y="0" width="104" height="40" rx="8"/>
    <text class="small ink" x="88" y="25" text-anchor="middle">Go generics</text>
    <text class="small ink" x="297" y="25" text-anchor="middle">range-over-func</text>
    <text class="small ink" x="493" y="25" text-anchor="middle">iter.Seq</text>
    <text class="small ink" x="670" y="25" text-anchor="middle">zero deps</text>
    <text class="small ink" x="860" y="25" text-anchor="middle">nil-safe reads</text>
    <text class="small ink" x="1020" y="25" text-anchor="middle">Clone</text>
  </g>
</svg>
