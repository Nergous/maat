<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Maat containers overview</title>
  <desc id="desc">Overview of stack, queue, and set packages in the maat Go module.</desc>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7fafc;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #617089;
      --line: #ccd6e3;
      --gold: #b7791f;
      --blue: #2b6cb0;
      --green: #2f855a;
      --red: #c53030;
      --chip: #eef3f8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --panel: #182235;
        --ink: #edf2f7;
        --muted: #a7b4c7;
        --line: #334155;
        --gold: #ecc94b;
        --blue: #63b3ed;
        --green: #68d391;
        --red: #fc8181;
        --chip: #223047;
      }
    }

    .bg { fill: var(--bg); }
    .panel { fill: var(--panel); stroke: var(--line); stroke-width: 2; }
    .title { fill: var(--ink); font: 700 48px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: var(--muted); font: 500 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: var(--ink); font: 700 26px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .small { fill: var(--muted); font: 500 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .tiny { fill: var(--muted); font: 500 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .code { fill: var(--ink); font: 600 17px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    .chip { fill: var(--chip); stroke: var(--line); stroke-width: 1.5; }
    .chipText { fill: var(--ink); font: 650 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .arrow { stroke: var(--muted); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .stack { fill: var(--blue); }
    .queue { fill: var(--green); }
    .setA { fill: var(--blue); fill-opacity: .28; stroke: var(--blue); stroke-width: 3; }
    .setB { fill: var(--gold); fill-opacity: .32; stroke: var(--gold); stroke-width: 3; }
    .accentGold { fill: var(--gold); }
    .accentRed { fill: var(--red); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#617089"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="560" rx="0"/>

  <g transform="translate(58 48)">
    <text class="title" x="0" y="0" dominant-baseline="hanging">maat</text>
    <text class="subtitle" x="0" y="62">generic, idiomatic data structures for Go</text>
  </g>

  <g transform="translate(830 50)">
    <path class="accentGold" d="M145 8h20v150h-20z"/>
    <path class="accentGold" d="M80 76h150v16H80z"/>
    <path class="accentGold" d="M152 18 98 158h108z" opacity=".16"/>
    <path class="accentGold" d="M82 92 42 178h80z" opacity=".18"/>
    <path class="accentGold" d="M232 92 192 178h80z" opacity=".18"/>
    <path class="arrow" d="M42 178h80M192 178h80"/>
    <circle class="accentGold" cx="155" cy="18" r="15"/>
    <text class="small" x="0" y="220">order / balance / clarity</text>
  </g>

  <g transform="translate(58 170)">
    <rect class="panel" width="330" height="270" rx="8"/>
    <text class="label" x="24" y="34">stack&lt;T&gt;</text>
    <text class="small" x="24" y="64">LIFO: last in, first out</text>

    <g transform="translate(44 100)">
      <rect class="chip" x="50" y="0" width="88" height="38" rx="6"/>
      <rect class="chip" x="50" y="44" width="88" height="38" rx="6"/>
      <rect class="chip" x="50" y="88" width="88" height="38" rx="6"/>
      <text class="code" x="94" y="25" text-anchor="middle">3</text>
      <text class="code" x="94" y="69" text-anchor="middle">2</text>
      <text class="code" x="94" y="113" text-anchor="middle">1</text>
      <path class="arrow" marker-end="url(#arrowhead)" d="M180 19h66"/>
      <text class="code" x="257" y="25">Pop 3</text>
      <text class="small" x="0" y="155">Push 1, 2, 3</text>
      <text class="small" x="166" y="155">Range: 3, 2, 1</text>
    </g>
  </g>

  <g transform="translate(435 170)">
    <rect class="panel" width="330" height="270" rx="8"/>
    <text class="label" x="24" y="34">queue&lt;T&gt;</text>
    <text class="small" x="24" y="64">FIFO: first in, first out</text>

    <g transform="translate(30 114)">
      <path class="arrow" marker-end="url(#arrowhead)" d="M0 35h48"/>
      <rect class="chip" x="58" y="16" width="62" height="38" rx="6"/>
      <rect class="chip" x="126" y="16" width="62" height="38" rx="6"/>
      <rect class="chip" x="194" y="16" width="62" height="38" rx="6"/>
      <path class="arrow" marker-end="url(#arrowhead)" d="M264 35h40"/>
      <text class="code" x="89" y="41" text-anchor="middle">1</text>
      <text class="code" x="157" y="41" text-anchor="middle">2</text>
      <text class="code" x="225" y="41" text-anchor="middle">3</text>
      <text class="small" x="8" y="95">Enqueue 1, 2, 3</text>
      <text class="small" x="172" y="95">Dequeue 1 first</text>
    </g>
  </g>

  <g transform="translate(812 170)">
    <rect class="panel" width="330" height="270" rx="8"/>
    <text class="label" x="24" y="34">set&lt;T&gt;</text>
    <text class="small" x="24" y="64">membership and set algebra</text>

    <g transform="translate(54 104)">
      <circle class="setA" cx="82" cy="70" r="62"/>
      <circle class="setB" cx="150" cy="70" r="62"/>
      <text class="code" x="48" y="74" text-anchor="middle">A</text>
      <text class="code" x="116" y="74" text-anchor="middle">A+B</text>
      <text class="code" x="184" y="74" text-anchor="middle">B</text>
      <text class="tiny" x="116" y="143" text-anchor="middle">Has, Add, Remove</text>
      <text class="tiny" x="116" y="163" text-anchor="middle">Union, Intersect, Difference</text>
    </g>
  </g>

  <g transform="translate(58 462)">
    <rect class="chip" x="0" y="0" width="185" height="44" rx="8"/>
    <rect class="chip" x="205" y="0" width="202" height="44" rx="8"/>
    <rect class="chip" x="427" y="0" width="170" height="44" rx="8"/>
    <rect class="chip" x="617" y="0" width="190" height="44" rx="8"/>
    <rect class="chip" x="827" y="0" width="210" height="44" rx="8"/>
    <text class="chipText" x="92" y="28" text-anchor="middle">Go generics</text>
    <text class="chipText" x="306" y="28" text-anchor="middle">range-over-func</text>
    <text class="chipText" x="512" y="28" text-anchor="middle">iter.Seq</text>
    <text class="chipText" x="712" y="28" text-anchor="middle">zero deps</text>
    <text class="chipText" x="932" y="28" text-anchor="middle">small APIs</text>
  </g>
</svg>
